---
- name: Define number of BMH's
  set_fact:
    NUMBER_OF_BMH: "{{ CONTROL_PLANE_MACHINE_COUNT|int +  WORKER_MACHINE_COUNT|int }}"
    general_containers:
    - httpd-infra
    - registry
    - sushy-tools
    - vbmc
    ironic_containers:
    - ironic
    - ironic-endpoint-keepalived
    - ironic-log-watch
    - dnsmasq

- name: Fetch container logs (kind cluster)
  block:

  - name: Create directories for storing container logs (kind cluster)
    file:
      path: "/tmp/{{ CONTAINER_RUNTIME }}/{{ item }}"
      state: directory
    with_items:
    - "{{ ironic_containers }}"
    - "{{ general_containers }}"

  - name: Fetch container logs before pivoting (kind cluster)
    shell: "sudo {{ CONTAINER_RUNTIME }} logs {{ item }} > /tmp/{{ CONTAINER_RUNTIME }}/{{ item }}/stdout.log 2> /tmp/{{ CONTAINER_RUNTIME }}/{{ item }}/stderr.log"
    with_items:
    - "{{ ironic_containers }}"
    - "{{ general_containers }}"

  - name: Remove ironic container from source cluster (kind cluster)
    docker_container:
      name: "{{ item }}"
      state: absent
    with_items: "{{ ironic_containers }}"

  when: BOOTSTRAP_CLUSTER == "kind"
  become: yes
  become_user: root

- name: Fetch container logs (minikube cluster)
  block:

  - name: Create directories for storing container logs (minikube cluster)
    file:
      path: "/tmp/{{ CONTAINER_RUNTIME }}/{{ item }}"
      state: directory
    with_items: "{{ general_containers }}"

  - name: Fetch container logs before pivoting (minikube cluster)
    shell: "sudo {{ CONTAINER_RUNTIME }} logs {{ item }} > /tmp/{{ CONTAINER_RUNTIME }}/{{ item }}/stdout.log 2> /tmp/{{ CONTAINER_RUNTIME }}/{{ item }}/stderr.log"
    with_items: "{{ general_containers }}"

  become: yes
  become_user: root
  when: BOOTSTRAP_CLUSTER == "minikube"

- name: Remove Ironic CR from source cluster (minikube cluster)
  kubernetes.core.k8s:
    api_version: ironic.metal3.io/v1alpha1
    kind: Ironic
    name: ironic
    namespace: "{{ IRONIC_NAMESPACE }}"
    state: absent
    wait: yes
    wait_timeout: 120
  when: BOOTSTRAP_CLUSTER == "minikube"

- name: Remove IronicDatabase CR from source cluster (minikube cluster)
  kubernetes.core.k8s:
    api_version: ironic.metal3.io/v1alpha1
    kind: IronicDatabase
    name: ironic-db
    namespace: "{{ IRONIC_NAMESPACE }}"
    state: absent
    wait: yes
    wait_timeout: 60
  when: BOOTSTRAP_CLUSTER == "minikube" and IRONIC_USE_MARIADB == "true"
  ignore_errors: yes

- name: Label baremetalhost CRD to pivot.
  shell: "kubectl label --overwrite crds baremetalhosts.metal3.io {{ item }}"
  with_items:
  - clusterctl.cluster.x-k8s.io=""
  - clusterctl.cluster.x-k8s.io/move=""
  - clusterctl.cluster.x-k8s.io/move-hierarchy=""

- name: Label hardwareData CRD to pivot.
  shell: "kubectl label --overwrite crds hardwaredata.metal3.io {{ item }}"
  with_items:
  - clusterctl.cluster.x-k8s.io=""
  - clusterctl.cluster.x-k8s.io/move=""

- name: Obtain target cluster kubeconfig
  kubernetes.core.k8s_info:
    kind: secrets
    name: "{{ CLUSTER_NAME }}-kubeconfig"
    namespace: "{{ NAMESPACE }}"
  register: metal3_kubeconfig

- name: Decode and save cluster kubeconfig
  copy:
    content: "{{ metal3_kubeconfig.resources[0].data.value | b64decode }}"
    dest: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"

- name: Create namespace
  kubernetes.core.k8s:
    name: "{{ NAMESPACE }}"
    kind: Namespace
    state: present
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"

- name: Initialize Provider component in target cluster
  vars:
    ipam_release: "{{ lookup('env', 'IPAMRELEASE') }}"
  shell: "clusterctl init --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml --core cluster-api:{{ CAPIRELEASE }} --bootstrap kubeadm:{{ CAPIRELEASE }} --control-plane kubeadm:{{ CAPIRELEASE }} --infrastructure metal3:{{ CAPM3RELEASE }} -v 5 --ipam metal3:{{ IPAMRELEASE }}"

# Check for cert-manager pods on the target cluster
- name: Check if cert-manager  pods in running state
  kubernetes.core.k8s_info:
    kind: pods
    namespace: cert-manager
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    field_selectors:
    - status.phase!=Running
  register: target_running_pods
  retries: 20
  delay: 20
  until: (target_running_pods is succeeded) and (target_running_pods.resources | length == 0)

# Install BMO
- name: Install Baremetal Operator
  shell: "{{ BMOPATH }}/tools/deploy.sh -b {{ BMO_IRONIC_ARGS }}"
  environment:
    IRONIC_HOST: "{{ IRONIC_HOST }}"
    IRONIC_HOST_IP: "{{ IRONIC_HOST_IP }}"
    KUBECTL_ARGS: "{{ KUBECTL_ARGS }}"
  args:
    chdir: "{{ BMOPATH }}"

# Install Ironic Standalone Operator
- name: Install Ironic Standalone Operator CRDs and controller
  shell: "make install deploy IMG={{ IRSO_IMAGE }}"
  environment:
    KUBECONFIG: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
  args:
    chdir: "{{ IRSOPATH }}"

- name: Wait for IRSO controller to be available
  kubernetes.core.k8s_info:
    kind: Deployment
    name: ironic-standalone-operator-controller-manager
    namespace: ironic-standalone-operator-system
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    wait: yes
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 60

# Create Ironic auth secret
- name: Read Ironic username
  slurp:
    src: "{{ IRONIC_AUTH_DIR }}ironic-username"
  register: ironic_username_content

- name: Read Ironic password
  slurp:
    src: "{{ IRONIC_AUTH_DIR }}ironic-password"
  register: ironic_password_content

- name: Create Ironic auth secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ironic-auth
        namespace: "{{ IRONIC_NAMESPACE }}"
        labels:
          environment.metal3.io/ironic-standalone-operator: "true"
      type: Opaque
      data:
        username: "{{ ironic_username_content.content }}"
        password: "{{ ironic_password_content.content }}"

# Create TLS secrets if TLS is enabled
- name: Create Ironic TLS certificate secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ironic-cert
        namespace: "{{ IRONIC_NAMESPACE }}"
        labels:
          environment.metal3.io/ironic-standalone-operator: "true"
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ lookup('file', IRONIC_CERT_FILE) | b64encode }}"
        tls.key: "{{ lookup('file', IRONIC_KEY_FILE) | b64encode }}"
  when: IRONIC_TLS_SETUP == "true"

- name: Create Ironic CA certificate secret (for BMO)
  kubernetes.core.k8s:
    state: present
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ironic-cacert
        namespace: "{{ IRONIC_NAMESPACE }}"
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ lookup('file', IRONIC_CACERT_FILE) | b64encode }}"
        tls.key: "{{ lookup('file', IRONIC_CAKEY_FILE) | b64encode }}"
  when: IRONIC_TLS_SETUP == "true"

# Create Ironic CR
- name: Create Ironic CR via IRSO
  kubernetes.core.k8s:
    state: present
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    definition:
      apiVersion: ironic.metal3.io/v1alpha1
      kind: Ironic
      metadata:
        name: ironic
        namespace: "{{ IRONIC_NAMESPACE }}"
      spec:
        apiCredentialsName: ironic-auth
        images:
          deployRamdiskBranch: "{{ IPA_BRANCH }}"
          deployRamdiskDownloader: "{{ IPA_DOWNLOADER_IMAGE }}"
          ironic: "{{ IRONIC_IMAGE }}"
          keepalived: "{{ IRONIC_KEEPALIVED_IMAGE }}"
        version: "{{ IRSO_IRONIC_VERSION }}"
        networking:
          dhcp:
            rangeBegin: "{{ CLUSTER_DHCP_RANGE_START }}"
            rangeEnd: "{{ CLUSTER_DHCP_RANGE_END }}"
            networkCIDR: "{{ BARE_METAL_PROVISIONER_NETWORK }}"
          interface: "{{ BARE_METAL_PROVISIONER_INTERFACE }}"
          ipAddress: "{{ CLUSTER_BARE_METAL_PROVISIONER_IP }}"
          ipAddressManager: keepalived
        deployRamdisk:
          sshKey: "{{ SSH_PUB_KEY_CONTENT }}"
          extraKernelParams: "{{ (NODES_PLATFORM == 'libvirt') | ternary('console=ttyS0', '') }}"
        tls: "{{ (IRONIC_TLS_SETUP == 'true') | ternary({'certificateName': 'ironic-cert'}, omit) }}"

# Create IronicDatabase CR if MariaDB is enabled
- name: Create IronicDatabase CR via IRSO
  kubernetes.core.k8s:
    state: present
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    definition:
      apiVersion: ironic.metal3.io/v1alpha1
      kind: IronicDatabase
      metadata:
        name: ironic-db
        namespace: "{{ IRONIC_NAMESPACE }}"
      spec:
        image: "{{ MARIADB_IMAGE }}"
  when: IRONIC_USE_MARIADB == "true"

- name: Update Ironic CR with database reference
  kubernetes.core.k8s:
    state: present
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    definition:
      apiVersion: ironic.metal3.io/v1alpha1
      kind: Ironic
      metadata:
        name: ironic
        namespace: "{{ IRONIC_NAMESPACE }}"
      spec:
        databaseName: ironic-db
    merge_type: merge
  when: IRONIC_USE_MARIADB == "true"

# Wait for Ironic to be ready
- name: Wait for Ironic CR to be ready
  kubernetes.core.k8s_info:
    api_version: ironic.metal3.io/v1alpha1
    kind: Ironic
    name: ironic
    namespace: "{{ IRONIC_NAMESPACE }}"
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
  register: ironic_cr
  retries: 60
  delay: 10
  until: >
    (ironic_cr is succeeded) and
    (ironic_cr.resources | length > 0) and
    (ironic_cr.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0)

- name: Label baremetalhost CRD in target cluster to pivot back.
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml label crds baremetalhosts.metal3.io {{ item }} --overwrite "
  with_items:
  - clusterctl.cluster.x-k8s.io=""
  - clusterctl.cluster.x-k8s.io/move=""
  - clusterctl.cluster.x-k8s.io/move-hierarchy=""

- name: Label hardwareData CRD in target cluster to pivot back.
  shell: "kubectl --kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml label crds hardwaredata.metal3.io {{ item }} --overwrite "
  with_items:
  - clusterctl.cluster.x-k8s.io=""
  - clusterctl.cluster.x-k8s.io/move=""

# Check for pods & nodes on the target cluster
- name: Check if pods in running state
  kubernetes.core.k8s_info:
    kind: pods
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
    field_selectors:
    - status.phase!=Running
  register: target_running_pods
  retries: 150
  delay: 20
  until: (target_running_pods is succeeded) and (target_running_pods.resources | length == 0)

- name: Check if all deployments replicas are available
  kubernetes.core.k8s_info:
    kind: Deployment
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"
  register: deployments
  retries: 150
  delay: 20
  until: (deployments is succeeded) and (deployments.resources | filter_unavailable_replicas | length == 0 )

- name: Pivot objects to target cluster
  shell: "clusterctl move --to-kubeconfig /tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml -n {{ NAMESPACE }} -v 10"

- name: Remove BMO deployment from source cluster
  kubernetes.core.k8s:
    name: "{{ NAMEPREFIX }}-controller-manager"
    kind: Deployment
    state: absent
    namespace: "{{ IRONIC_NAMESPACE }}"

- name: Verify that all machines are provisioned and running.
  include_tasks: verify_resources_states.yml
  vars:
    kubeconfig: "/tmp/kubeconfig-{{ CLUSTER_NAME }}.yaml"

# Normally as non authenticated user we should
# fail here(get 401) to reach Ironic.
- name: Expect 401 from /v1/nodes ednpoint
  uri:
    url: "{{ IRONIC_URL }}nodes"
    return_content: no
    validate_certs: no
    method: GET
    status_code: [ 401 ]
